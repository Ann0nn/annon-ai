<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Annon AI</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo"><div class="logo-icon">A</div></div>
      <button class="new-chat-btn" onclick="newChat()">+ NEW CHAT</button>
    </div>

    <div class="sidebar-section">
      <p class="section-label">Recent Conversations</p>
      <div class="chat-list" id="chatList"></div>
    </div>

    <div class="sidebar-bottom">
      <button class="sidebar-bottom-btn" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
      <button class="sidebar-bottom-btn" onclick="openModal('settingsModal')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </div>
  </aside>

  <!-- MAIN CHAT -->
  <main class="main">
    <div class="chat-header">
      <div class="chat-header-left">
        <h2 id="chatTitle">Annon AI</h2>
        <span class="online-badge">● Online</span>
      </div>
      <div class="chat-header-right">
        <button class="header-btn" onclick="shareChat()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Share
        </button>
        <button class="header-btn danger" onclick="deleteChat()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Delete
        </button>
      </div>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="chat-input-area">
      <div class="input-box">
        <button class="input-icon-btn" title="Attach file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <button class="input-icon-btn" title="Voice input">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <input type="text" id="userInput" placeholder="Ask me anything..." />
        <button class="send-btn" onclick="sendMessage()">
          Send
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
  </main>

  <!-- SETTINGS MODAL -->
  <div class="modal-overlay" id="settingsModal" onclick="closeModalOutside(event, 'settingsModal')">
    <div class="modal">
      <div class="modal-header">
        <h3>Settings</h3>
        <button class="modal-close" onclick="closeModal('settingsModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="profile-field">
          <label>AI Name</label>
          <input type="text" id="settingAIName" value="Annon AI" />
        </div>
        <div class="profile-field">
          <label>Personality / System Prompt</label>
          <textarea id="settingSystemPrompt" rows="3">You are Annon AI, a helpful and friendly assistant.</textarea>
        </div>
        <div class="profile-field">
          <label>Typewriter Speed</label>
          <select id="settingSpeed">
            <option value="8">Fast</option>
            <option value="16" selected>Normal</option>
            <option value="30">Slow</option>
          </select>
        </div>
        <div class="profile-field">
          <label>Theme</label>
          <select id="settingTheme">
            <option value="dark" selected>🌙 Dark Mode</option>
            <option value="light">☀️ Light Mode</option>
          </select>
        </div>
        <button class="modal-save-btn" onclick="saveSettings()">Save Settings</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
